<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playing Cards</title>
  <link href="styles.css" rel="stylesheet">

</head>

<body class="background">
  <main id="playing-cards">
    <div class="card">
      <div class="left">A♠</div>
      <div class="middle">♠</div>
      <div class="right">A♠</div>
    </div>
    
    <div class="card">
      <div class="left">2♠</div>
      <div class="middle">♠♠</div>
      <div class="right">2♠</div>
    </div>
    
    <div class="card">
      <div class="left">3♠</div>
      <div class="middle">♠♠♠</div>
      <div class="right">3♠</div>
    </div>
    
    <div class="card">
      <div class="left red">A♥</div>
      <div class="middle red">♥</div>
      <div class="right red">A♥</div>
    </div>
    
    <div class="card">
      <div class="left red">2♥</div>
      <div class="middle red">♥♥</div>
      <div class="right red">2♥</div>
    </div>
    
    <div class="card">
      <div class="left red">3♥</div>
      <div class="middle red">♥♥♥</div>
      <div class="right red">3♥</div>
    </div>
  </main>
</body>

</html>
