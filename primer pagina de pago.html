<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Checkout Page</title>
</head>

<body>
    <h1>Checkout</h1>
    <section>
        <h2>Your Cart</h2>
        <img src="https://cdn.freecodecamp.org/curriculum/labs/cube.jpg" alt="Cubo rubik desarmado" >
                <p>Rubik cube 3x3</p>

        <p>$5000</p>
    </section>
        
    <section>


        <h2>Payment Information</h2>

        <form>
    <label for="card-name">Cardholder Name<span class="requerido" aria-hidden="true">*</span></label>
    <input id="card-name" name="card-name" type="text" required/>

    <label for="card-number">Card Number<span class="requerido" aria-hidden="true">*</span></label>
    <input id="card-number" name="card-number" type="text" aria-describedby="card-number-help" required />
    <p id="card-number-help">Please enter your 16-digit card number without spaces or dashes.</p> 

    <label for="expiry-date">Expiry date:<span class="requerido" aria-hidden="true">*</span></label>
    <input id="expiry-date" name="expiry-date" type="text" required placeholder="MM/YY"/>

    <label for="cvv">CVV<span class="requerido" aria-hidden="true">*</span></label>
    <input id="cvv" name="cvv" type="text" required/>

    <button type="button" id="order-ready">Order Ready!</button>
</form>
